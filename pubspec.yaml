name: enyx_starter
description: Production-grade Flutter starter pack with Clean Architecture-lite, Riverpod, GoRouter, and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management & DI
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.1.0

  # Routing
  go_router: ^17.1.0

  # Backend – Supabase
  supabase_flutter: ^2.12.0

  # Networking – Dio (for external REST / edge-case APIs)
  dio: ^5.9.1

  # Code generation helpers
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.6.2

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Deep links
  app_links: ^6.2.0

  # Notifications
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1

  # UI helpers
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  flutter_dotenv: ^6.0.0
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.3.0
  # Temporarily removed to avoid analyzer/version conflicts with flutter_test.
  # riverpod_generator: ^4.0.3
  freezed: ^3.1.0
  json_serializable: ^6.10.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/themes/
    - .env

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
